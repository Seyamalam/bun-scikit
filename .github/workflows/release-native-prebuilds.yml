name: Release Native Prebuilds

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: native-prebuilds-${{ github.event.release.tag_name || github.sha }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release-prep:
    uses: ./.github/workflows/release-prep.yml
    with:
      ref: ${{ github.ref }}

  build-assets:
    needs: release-prep
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            osName: linux
            archName: x64
          - runner: windows-latest
            osName: windows
            archName: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies
        env:
          BUN_SCIKIT_SKIP_NATIVE_INSTALL: "1"
        run: bun install --frozen-lockfile

      - name: Build native artifacts
        run: bun run native:build:all

      - name: Package release assets
        run: bun run native:package:assets --os ${{ matrix.osName }} --arch ${{ matrix.archName }}

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: native-assets-${{ matrix.osName }}-${{ matrix.archName }}
          path: dist/release-assets/*

  upload-assets:
    runs-on: ubuntu-latest
    needs: build-assets
    if: github.event_name == 'release'
    steps:
      - name: Download all assets
        uses: actions/download-artifact@v4
        with:
          pattern: native-assets-*
          merge-multiple: true
          path: dist/release-assets

      - name: Publish assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release-assets/*
