name: Release Guard

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to validate (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify tag and package.json version match
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "v${PKG_VERSION}" != "${TAG}" ]; then
            echo "Tag/version mismatch: tag=${TAG}, package.json=${PKG_VERSION}"
            exit 1
          fi

      - name: Verify package version is unpublished
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "Version already exists on npm: ${PKG_NAME}@${PKG_VERSION}"
            exit 1
          fi

      - name: Check duplicate release workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const targetNames = new Set(["Publish to npm", "Release Native Prebuilds"]);
            const { owner, repo } = context.repo;
            const headSha = context.sha;
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              per_page: 100,
            });

            const counts = new Map();
            for (const run of runs) {
              if (!targetNames.has(run.name)) continue;
              if (run.head_sha !== headSha) continue;
              if (run.status === "cancelled") continue;
              const key = `${run.name}`;
              counts.set(key, (counts.get(key) ?? 0) + 1);
            }

            const duplicates = [...counts.entries()].filter(([, count]) => count > 1);
            if (duplicates.length > 0) {
              core.setFailed(
                `Duplicate release workflow runs detected for ${headSha}: ` +
                duplicates.map(([name, count]) => `${name}=${count}`).join(", "),
              );
              return;
            }

            core.info(`Release guard passed. No duplicate publish/native runs for ${headSha}.`);
