name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies
        env:
          BUN_SCIKIT_SKIP_NATIVE_INSTALL: "1"
        run: bun install --frozen-lockfile

      - name: Build Zig kernels
        run: bun run native:build

      - name: Run tests
        run: bun run test

      - name: Run typecheck
        run: bun run typecheck

      - name: Generate API docs
        run: bun run docs:api:generate

      - name: Check API docs coverage
        run: bun run docs:coverage:check

      - name: Consumer smoke test (no trust required)
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          npm pack --silent
          mkdir -p /tmp/bun-scikit-smoke
          cd /tmp/bun-scikit-smoke
          bun init -y
          bun add "${GITHUB_WORKSPACE}/bun-scikit-${PKG_VERSION}.tgz"
          cat > index.ts <<'EOF'
          import { LinearRegression, LogisticRegression } from "bun-scikit";
          const X = [[1],[2],[3],[4]];
          const yReg = [2,4,6,8];
          const yCls = [0,0,1,1];
          const r = new LinearRegression({ solver: "normal" });
          r.fit(X, yReg);
          const c = new LogisticRegression({ maxIter: 50, learningRate: 0.5, tolerance: 1e-5 });
          c.fit(X, yCls);
          console.log(r.predict([[5]])[0], c.predict([[1],[4]]));
          EOF
          bun run index.ts

  native-addon-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies
        env:
          BUN_SCIKIT_SKIP_NATIVE_INSTALL: "1"
        run: bun install --frozen-lockfile

      - name: Build Zig kernels + Node-API addon
        run: bun run native:build:all

      - name: Run native smoke tests
        run: bun test test/linear-regression.test.ts test/logistic-regression.test.ts

  zig-tree-smoke:
    runs-on: ubuntu-latest
    env:
      BUN_SCIKIT_TREE_BACKEND: "zig"
      BUN_SCIKIT_NATIVE_BRIDGE: "ffi"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies
        env:
          BUN_SCIKIT_SKIP_NATIVE_INSTALL: "1"
        run: bun install --frozen-lockfile

      - name: Build Zig kernels
        run: bun run native:build

      - name: Run zig tree smoke tests
        run: bun test test/decision-tree-classifier.test.ts test/random-forest-classifier.test.ts

  benchmarks:
    runs-on: ubuntu-latest
    env:
      BENCH_ITERATIONS: 50
      BENCH_WARMUP: 8
      BENCH_TREE_BACKEND_MATRIX: "1"
      PYTHONHASHSEED: "0"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      BENCH_MIN_DECISION_TREE_FIT_SPEEDUP: "1.1"
      BENCH_MIN_DECISION_TREE_PREDICT_SPEEDUP: "1.2"
      BENCH_MIN_RANDOM_FOREST_FIT_SPEEDUP: "2.0"
      BENCH_MIN_RANDOM_FOREST_PREDICT_SPEEDUP: "1.2"
      BENCH_MAX_ZIG_TREE_FIT_SLOWDOWN_VS_JS: "20"
      BENCH_MAX_ZIG_TREE_PREDICT_SLOWDOWN_VS_JS: "20"
      BENCH_MAX_ZIG_FOREST_FIT_SLOWDOWN_VS_JS: "20"
      BENCH_MAX_ZIG_FOREST_PREDICT_SLOWDOWN_VS_JS: "20"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install Bun dependencies
        env:
          BUN_SCIKIT_SKIP_NATIVE_INSTALL: "1"
        run: bun install --frozen-lockfile

      - name: Install Python benchmark dependencies
        run: python -m pip install -r bench/python/requirements.txt

      - name: Build Zig kernels
        run: bun run native:build

      - name: Run Bun vs scikit-learn benchmark
        run: bun run bench:ci

      - name: Validate benchmark metrics
        run: bun run bench:health

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: heart-benchmark-results
          path: |
            bench/results/heart-ci-current.json
            bench/results/heart-ci-current.md
