name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Zig kernels
        run: bun run native:build

      - name: Run tests
        run: bun run test

      - name: Run typecheck
        run: bun run typecheck

      - name: Generate API docs
        run: bun run docs:api:generate

      - name: Check API docs coverage
        run: bun run docs:coverage:check

      - name: Verify README benchmark section
        run: bun run bench:readme:check

  native-addon-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Zig kernels + Node-API addon
        run: bun run native:build:all

      - name: Run native smoke tests
        run: bun test test/linear-regression.test.ts test/logistic-regression.test.ts

  benchmarks:
    runs-on: ubuntu-latest
    env:
      BENCH_ITERATIONS: 50
      BENCH_WARMUP: 8
      PYTHONHASHSEED: "0"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Install Python benchmark dependencies
        run: python -m pip install -r bench/python/requirements.txt

      - name: Build Zig kernels
        run: bun run native:build

      - name: Run Bun vs scikit-learn benchmark
        run: bun run bench:ci

      - name: Validate benchmark metrics
        run: bun run bench:health

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: heart-benchmark-results
          path: |
            bench/results/heart-ci-current.json
            bench/results/heart-ci-current.md
