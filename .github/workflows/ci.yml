name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies
        env:
          BUN_SCIKIT_SKIP_NATIVE_INSTALL: "1"
        run: bun install --frozen-lockfile

      - name: Build Zig kernels
        run: bun run native:build

      - name: Run tests
        run: bun run test

      - name: Run typecheck
        run: bun run typecheck

      - name: Generate API docs
        run: bun run docs:api:generate

      - name: Check API docs coverage
        run: bun run docs:coverage:check

      - name: Consumer smoke test (no trust required)
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          npm pack --silent
          mkdir -p /tmp/bun-scikit-smoke
          cd /tmp/bun-scikit-smoke
          bun init -y
          bun add "${GITHUB_WORKSPACE}/bun-scikit-${PKG_VERSION}.tgz"
          cat > index.ts <<'EOF'
          import { LinearRegression, LogisticRegression } from "bun-scikit";
          const X = [[1],[2],[3],[4]];
          const yReg = [2,4,6,8];
          const yCls = [0,0,1,1];
          const r = new LinearRegression({ solver: "normal" });
          r.fit(X, yReg);
          const c = new LogisticRegression({ maxIter: 50, learningRate: 0.5, tolerance: 1e-5 });
          c.fit(X, yCls);
          console.log(r.predict([[5]])[0], c.predict([[1],[4]]));
          EOF
          bun run index.ts

  parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        env:
          BUN_SCIKIT_SKIP_NATIVE_INSTALL: "1"
        run: bun install --frozen-lockfile

      - name: Validate parity matrix coverage
        env:
          PARITY_MATRIX_REPORT_PATH: "bench/results/parity/parity-matrix-report.json"
        run: bun run parity:matrix:check

      - name: Run sklearn snapshot parity checks
        env:
          PARITY_SKLEARN_REPORT_PATH: "bench/results/parity/parity-sklearn-report.json"
        run: bun run parity:check

      - name: Run full sklearn symbol parity coverage
        env:
          PARITY_FULL_REPORT_PATH: "bench/results/parity/parity-full-report.json"
          PARITY_FULL_STRICT: "0"
          PARITY_FULL_MODULE_GATES_PATH: "docs/parity-module-gates.json"
        run: bun run parity:full:check

      - name: Build parity report bundle
        env:
          PARITY_REPORT_DIR: "bench/results/parity"
          PARITY_MATRIX_REPORT_PATH: "bench/results/parity/parity-matrix-report.json"
          PARITY_SKLEARN_REPORT_PATH: "bench/results/parity/parity-sklearn-report.json"
          PARITY_FULL_REPORT_PATH: "bench/results/parity/parity-full-report.json"
          PARITY_HISTORY_PATH: "bench/results/history/parity-history.jsonl"
        run: bun run parity:report

      - name: Upload parity artifact
        uses: actions/upload-artifact@v4
        with:
          name: parity-report
          path: |
            bench/results/parity
            bench/results/history/parity-history.jsonl

  native-addon-matrix:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies
        env:
          BUN_SCIKIT_SKIP_NATIVE_INSTALL: "1"
        run: bun install --frozen-lockfile

      - name: Build Zig kernels + Node-API addon
        run: bun run native:build:all

      - name: Run native smoke tests
        run: bun test test/linear-regression.test.ts test/logistic-regression.test.ts

  zig-tree-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      BUN_SCIKIT_TREE_BACKEND: "zig"
      BUN_SCIKIT_NATIVE_BRIDGE: "ffi"
      BUN_SCIKIT_REQUIRE_ZIG_BACKEND: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies
        env:
          BUN_SCIKIT_SKIP_NATIVE_INSTALL: "1"
        run: bun install --frozen-lockfile

      - name: Build Zig kernels
        run: bun run native:build

      - name: Run zig tree smoke tests
        run: bun test test/zig-backend-guard.test.ts test/decision-tree-classifier.test.ts test/random-forest-classifier.test.ts

  benchmarks:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      BENCH_ITERATIONS: 50
      BENCH_WARMUP: 8
      BENCH_TREE_BACKEND_MATRIX: "1"
      PYTHONHASHSEED: "0"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      BENCH_MIN_DECISION_TREE_FIT_SPEEDUP: "1.1"
      BENCH_MIN_DECISION_TREE_PREDICT_SPEEDUP: "1.2"
      BENCH_MIN_CLASSIFICATION_FIT_SPEEDUP: "1.0"
      BENCH_MIN_CLASSIFICATION_PREDICT_SPEEDUP: "1.2"
      BENCH_MIN_RANDOM_FOREST_FIT_SPEEDUP: "2.0"
      BENCH_MIN_RANDOM_FOREST_PREDICT_SPEEDUP: "1.2"
      BENCH_MAX_ZIG_TREE_FIT_SLOWDOWN_VS_JS: "3.0"
      BENCH_MAX_ZIG_TREE_PREDICT_SLOWDOWN_VS_JS: "3.0"
      BENCH_MAX_ZIG_FOREST_FIT_SLOWDOWN_VS_JS: "3.0"
      BENCH_MAX_ZIG_FOREST_PREDICT_SLOWDOWN_VS_JS: "3.0"
      BENCH_MAX_ZIG_TREE_ACCURACY_DROP_VS_JS: "0.06"
      BENCH_MAX_ZIG_TREE_F1_DROP_VS_JS: "0.06"
      BENCH_MAX_ZIG_FOREST_ACCURACY_DROP_VS_JS: "0.03"
      BENCH_MAX_ZIG_FOREST_F1_DROP_VS_JS: "0.03"
      BENCH_MIN_ZIG_TREE_FIT_RETENTION_VS_BASELINE: "0.35"
      BENCH_MIN_ZIG_FOREST_FIT_RETENTION_VS_BASELINE: "0.35"
      BENCH_RETENTION_GRACE_RATIO: "0.05"
      BENCH_MIN_DT_HOTPATH_FIT_RETENTION: "0.60"
      BENCH_MIN_DT_HOTPATH_PREDICT_RETENTION: "0.60"
      BENCH_MIN_RF_HOTPATH_FIT_RETENTION: "0.60"
      BENCH_MIN_RF_HOTPATH_PREDICT_RETENTION: "0.55"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install Bun dependencies
        env:
          BUN_SCIKIT_SKIP_NATIVE_INSTALL: "1"
        run: bun install --frozen-lockfile

      - name: Install Python benchmark dependencies
        run: python -m pip install -r bench/python/requirements.txt

      - name: Build Zig kernels
        run: bun run native:build

      - name: Run Bun vs scikit-learn benchmark
        run: bun run bench:ci

      - name: Run tree hot-path microbench
        env:
          BENCH_ITERATIONS: "12"
          BENCH_WARMUP: "3"
          BENCH_TREE_SAMPLES: "4000"
          BENCH_TREE_FEATURES: "24"
        run: bun run bench:hotpaths

      - name: Validate tree hot-path microbench regressions
        run: bun run bench:hotpaths:check

      - name: Validate benchmark metrics
        run: bun run bench:health

      - name: Verify README benchmark sync
        run: bun run bench:readme:check

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: heart-benchmark-results
          path: |
            bench/results/heart-ci-current.json
            bench/results/heart-ci-current.md
            bench/results/tree-hotpaths-current.json

      - name: Add benchmark summary to workflow summary
        shell: bash
        run: |
          echo "## Benchmark Summary (heart-ci-current.md)" >> "$GITHUB_STEP_SUMMARY"
          cat bench/results/heart-ci-current.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment benchmark summary on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- bun-scikit-benchmark-summary -->";
            const summary = fs.readFileSync("bench/results/heart-ci-current.md", "utf8");
            const body = `${marker}
            ## bun-scikit Benchmark Summary

            ${summary}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) => comment.user?.type === "Bot" && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
