name: Benchmark Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: write

jobs:
  update-snapshot:
    runs-on: ubuntu-latest
    env:
      BENCH_ITERATIONS: 50
      BENCH_WARMUP: 8
      BENCH_TREE_BACKEND_MATRIX: "1"
      PYTHONHASHSEED: "0"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install Bun dependencies
        env:
          BUN_SCIKIT_SKIP_NATIVE_INSTALL: "1"
        run: bun install --frozen-lockfile

      - name: Install Python benchmark dependencies
        run: python -m pip install -r bench/python/requirements.txt

      - name: Build Zig kernels
        run: bun run native:build

      - name: Regenerate benchmark snapshot
        run: bun run bench:snapshot

      - name: Commit snapshot updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(bench): update CI benchmark snapshot"
          file_pattern: "bench/results/heart-ci-latest.json bench/results/heart-ci-latest.md bench/results/history/heart-ci-history.jsonl"
